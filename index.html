<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfficeStock Pro — ระบบจัดการอุปกรณ์สำนักงาน</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- XLSX -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-body: #060f24;
            --bg-sidebar: #020917;
            --bg-card: #0d1f3c;
            --bg-input: #001748;
            --text-primary: #f0f6ff;
            --text-secondary: #93b8e8;
            --text-muted: #5a8fd4;
            --border: rgba(255,255,255,0.07);
            --border-hover: rgba(255,255,255,0.13);
            --cyan: #38bdf8;
            --gold: #e8b84b;
            --gold2: #c8922a;
            --green: #4ade80;
            --red: #f87171;
            --amber: #fbbf24;
            --purple: #a78bfa;
            --teal: #2dd4bf;
        }

        .light-mode {
            --bg-body: #ffffff;
            --bg-sidebar: #f8fafc;
            --bg-card: #ffffff;
            --bg-input: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #475569;
            --border: rgba(0,0,0,0.08);
            --border-hover: rgba(0,0,0,0.12);
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            font-size: 14px;
            transition: background 0.3s ease;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: #1e4175; border-radius: 99px; }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Glass Effect */
        .glass {
            background: rgba(13, 31, 60, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
        }

        .light-mode .glass {
            background: rgba(255, 255, 255, 0.92);
        }

        /* Loading Spinner */
        .spinner {
            border: 2px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modal Backdrop */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(2, 9, 23, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useCallback, useMemo } = React;

        // ==================== Context ====================
        const AuthContext = createContext(null);
        const ThemeContext = createContext(null);
        const InventoryContext = createContext(null);

        // ==================== Custom Hooks ====================
        const useAuth = () => useContext(AuthContext);
        const useTheme = () => useContext(ThemeContext);
        const useInventory = () => useContext(InventoryContext);

        // ==================== Icons Component ====================
        const Icons = {
            Dashboard: () => <span>◈</span>,
            Package: () => <span>▤</span>,
            MapPin: () => <span>⬡</span>,
            ArrowDown: () => <span>↓</span>,
            ArrowUp: () => <span>↑</span>,
            History: () => <span>≡</span>,
            ShoppingCart: () => <span>◻</span>,
            FileSpreadsheet: () => <span>⇩</span>,
            Users: () => <span>👥</span>,
            Settings: () => <span>◎</span>,
            Sun: () => <span>☀️</span>,
            Moon: () => <span>🌙</span>,
            LogOut: () => <span>⏏</span>,
            ChevronLeft: () => <span>←</span>,
            ChevronRight: () => <span>→</span>,
            Search: () => <span>🔍</span>,
            AlertTriangle: () => <span>⚠️</span>,
            X: () => <span>✕</span>,
            Plus: () => <span>＋</span>,
            Edit: () => <span>✎</span>,
            Trash: () => <span>🗑</span>,
            Check: () => <span>✓</span>,
        };

        // ==================== UI Components ====================
        const Card = ({ children, className = '', onClick }) => (
            <div 
                onClick={onClick}
                className={`bg-[var(--bg-card)] border border-[var(--border)] rounded-xl overflow-hidden transition-all hover:border-[var(--border-hover)] ${className}`}
            >
                {children}
            </div>
        );

        const CardHeader = ({ children, className = '' }) => (
            <div className={`px-5 py-3 border-b border-[var(--border)] ${className}`}>{children}</div>
        );

        const CardTitle = ({ children, icon }) => (
            <div className="flex items-center gap-2 text-sm font-semibold text-[var(--text-primary)]">
                {icon && <span>{icon}</span>}
                {children}
            </div>
        );

        const CardContent = ({ children, className = '' }) => (
            <div className={`p-5 ${className}`}>{children}</div>
        );

        const Badge = ({ children, variant = 'default' }) => {
            const variants = {
                success: 'bg-green-500/10 text-green-400 border border-green-500/20',
                warning: 'bg-amber-500/10 text-amber-400 border border-amber-500/20',
                danger: 'bg-red-500/10 text-red-400 border border-red-500/20',
                info: 'bg-cyan-500/10 text-cyan-400 border border-cyan-500/20',
                purple: 'bg-purple-500/10 text-purple-400 border border-purple-500/20',
                default: 'bg-dark-700/50 text-gray-400 border border-border',
            };
            return (
                <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs ${variants[variant]}`}>
                    {children}
                </span>
            );
        };

        const Button = ({ children, onClick, variant = 'default', size = 'md', disabled, className = '' }) => {
            const variants = {
                primary: 'bg-gradient-to-r from-[var(--gold)] to-[var(--gold2)] text-[#020917] font-bold shadow-lg hover:brightness-105',
                secondary: 'bg-transparent border border-[var(--border-hover)] text-[var(--text-secondary)] hover:bg-[var(--bg-input)]',
                success: 'bg-green-500/10 text-green-400 border border-green-500/20 hover:bg-green-500/20',
                danger: 'bg-red-500/10 text-red-400 border border-red-500/20 hover:bg-red-500/20',
                ghost: 'bg-transparent text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--border)]',
            };
            const sizes = {
                sm: 'px-3 py-1.5 text-xs',
                md: 'px-4 py-2 text-sm',
                lg: 'px-5 py-2.5 text-base',
            };
            return (
                <button
                    onClick={onClick}
                    disabled={disabled}
                    className={`rounded-lg font-medium transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed ${variants[variant]} ${sizes[size]} ${className}`}
                >
                    {children}
                </button>
            );
        };

        const Input = ({ label, type = 'text', value, onChange, placeholder, required, className = '' }) => (
            <div className="flex flex-col gap-1.5">
                {label && <label className="text-[10px] font-bold uppercase tracking-wider text-[var(--text-muted)]">{label}</label>}
                <input
                    type={type}
                    value={value}
                    onChange={(e) => onChange(e.target.value)}
                    placeholder={placeholder}
                    className={`px-3 py-2 bg-[var(--bg-input)] border border-[var(--border-hover)] rounded-lg text-sm text-[var(--text-primary)] placeholder:text-[var(--text-muted)] focus:outline-none focus:border-[var(--cyan)] transition-colors ${className}`}
                />
            </div>
        );

        const Select = ({ label, value, onChange, options, className = '' }) => (
            <div className="flex flex-col gap-1.5">
                {label && <label className="text-[10px] font-bold uppercase tracking-wider text-[var(--text-muted)]">{label}</label>}
                <select
                    value={value}
                    onChange={(e) => onChange(e.target.value)}
                    className={`px-3 py-2 bg-[var(--bg-input)] border border-[var(--border-hover)] rounded-lg text-sm text-[var(--text-primary)] focus:outline-none focus:border-[var(--cyan)] ${className}`}
                >
                    {options.map(opt => (
                        <option key={opt.value} value={opt.value}>{opt.label}</option>
                    ))}
                </select>
            </div>
        );

        const Modal = ({ isOpen, onClose, title, children, maxWidth = '500px' }) => {
            if (!isOpen) return null;
            return (
                <div className="modal-backdrop" onClick={onClose}>
                    <div className="bg-[var(--bg-card)] border border-[var(--border-hover)] rounded-2xl w-full animate-fade-in" style={{ maxWidth }} onClick={(e) => e.stopPropagation()}>
                        <div className="flex items-center justify-between p-5 border-b border-[var(--border)]">
                            <h3 className="text-base font-bold text-[var(--text-primary)]">{title}</h3>
                            <button onClick={onClose} className="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-[var(--border)] transition-colors">
                                <Icons.X />
                            </button>
                        </div>
                        <div className="p-5">{children}</div>
                    </div>
                </div>
            );
        };

        // ==================== Stats Card ====================
        const StatsCard = ({ title, value, subtitle, icon, color }) => (
            <Card className="relative overflow-hidden group">
                <CardContent className="p-5">
                    <div className="flex items-center justify-between">
                        <div>
                            <p className="text-[10px] font-bold uppercase tracking-wider text-[var(--text-muted)]">{title}</p>
                            <p className={`text-3xl font-bold mt-1 text-${color}-400`}>{value}</p>
                            <p className="text-xs text-[var(--text-muted)] mt-1">{subtitle}</p>
                        </div>
                        <div className={`w-12 h-12 rounded-full bg-${color}-500/10 flex items-center justify-center group-hover:scale-110 transition-transform text-2xl`}>
                            {icon}
                        </div>
                    </div>
                </CardContent>
                <div className={`absolute bottom-0 left-0 right-0 h-0.5 bg-${color}-500/50 group-hover:h-1 transition-all`} />
            </Card>
        );

        // ==================== Data Table ====================
        const DataTable = ({ columns, data, searchPlaceholder, searchKey, onSearchChange }) => {
            const [search, setSearch] = useState('');
            const [page, setPage] = useState(0);
            const pageSize = 10;

            const filteredData = useMemo(() => {
                if (!searchKey || !search) return data;
                return data.filter(item => 
                    String(item[searchKey]).toLowerCase().includes(search.toLowerCase())
                );
            }, [data, search, searchKey]);

            const paginatedData = filteredData.slice(page * pageSize, (page + 1) * pageSize);
            const totalPages = Math.ceil(filteredData.length / pageSize);

            const handleSearch = (value) => {
                setSearch(value);
                setPage(0);
                onSearchChange?.(value);
            };

            return (
                <Card>
                    {(searchPlaceholder || onSearchChange) && (
                        <CardHeader className="flex flex-row items-center justify-between">
                            {searchPlaceholder && (
                                <div className="relative">
                                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Icons.Search /></span>
                                    <input
                                        type="text"
                                        value={search}
                                        onChange={(e) => handleSearch(e.target.value)}
                                        placeholder={searchPlaceholder}
                                        className="pl-9 pr-3 py-1.5 text-sm bg-[var(--bg-input)] border border-[var(--border)] rounded-lg focus:outline-none focus:border-[var(--cyan)]"
                                    />
                                </div>
                            )}
                        </CardHeader>
                    )}
                    <CardContent>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead>
                                    <tr className="border-b border-[var(--border)]">
                                        {columns.map(col => (
                                            <th key={col.key} className="text-left py-3 px-2 text-[10px] font-bold uppercase tracking-wider text-[var(--text-muted)]">
                                                {col.label}
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    {paginatedData.length === 0 ? (
                                        <tr>
                                            <td colSpan={columns.length} className="text-center py-12 text-[var(--text-muted)]">
                                                <div className="text-4xl mb-2">📦</div>
                                                <p>ไม่มีข้อมูล</p>
                                            </td>
                                        </tr>
                                    ) : (
                                        paginatedData.map((row, idx) => (
                                            <tr key={idx} className="border-b border-[var(--border)]/50 hover:bg-[var(--bg-input)]/50 transition-colors">
                                                {columns.map(col => (
                                                    <td key={col.key} className="py-2.5 px-2">
                                                        {col.render ? col.render(row[col.key], row) : row[col.key]}
                                                    </td>
                                                ))}
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                        {totalPages > 1 && (
                            <div className="flex items-center justify-between mt-4 pt-2">
                                <button
                                    onClick={() => setPage(p => Math.max(0, p - 1))}
                                    disabled={page === 0}
                                    className="p-1.5 rounded-lg hover:bg-[var(--border)] disabled:opacity-50 transition-colors"
                                >
                                    <Icons.ChevronLeft />
                                </button>
                                <span className="text-xs text-[var(--text-muted)]">หน้า {page + 1} จาก {totalPages}</span>
                                <button
                                    onClick={() => setPage(p => Math.min(totalPages - 1, p + 1))}
                                    disabled={page === totalPages - 1}
                                    className="p-1.5 rounded-lg hover:bg-[var(--border)] disabled:opacity-50 transition-colors"
                                >
                                    <Icons.ChevronRight />
                                </button>
                            </div>
                        )}
                    </CardContent>
                </Card>
            );
        };

        // ==================== Main App ====================
        const App = () => {
            const [isDark, setIsDark] = useState(true);
            const [currentUser, setCurrentUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [loading, setLoading] = useState(false);
            
            // Mock Data
            const [items, setItems] = useState([
                { id: 'IT001', name: 'กระดาษ A4 80g', category: 'กระดาษ', location: 'ห้องเอกสาร', qty: 45, unit: 'รีม', min: 10, price: 120 },
                { id: 'IT002', name: 'ปากกาลูกลื่น (ดำ)', category: 'เครื่องเขียน', location: 'ตู้เก็บของ A1', qty: 6, unit: 'แพ็ค', min: 5, price: 35 },
                { id: 'IT003', name: 'แฟ้มเจาะ', category: 'เครื่องเขียน', location: 'ตู้เก็บของ A1', qty: 2, unit: 'อัน', min: 8, price: 25 },
                { id: 'IT004', name: 'หมึกพิมพ์ HP', category: 'อุปกรณ์ IT', location: 'ตู้อุปกรณ์ IT', qty: 12, unit: 'ตลับ', min: 3, price: 850 },
            ]);

            const [transactions, setTransactions] = useState([
                { id: 'T001', date: '2026-03-20 09:15', type: 'รับสินค้า', item_name: 'กระดาษ A4 80g', qty: 20, by: 'คุณสมชาย', ref: 'DO-001' },
                { id: 'T002', date: '2026-03-21 10:30', type: 'เบิกสินค้า', item_name: 'ปากกาลูกลื่น (ดำ)', qty: 2, by: 'แผนกบัญชี', ref: '' },
                { id: 'T003', date: '2026-03-22 14:00', type: 'รับสินค้า', item_name: 'หมึกพิมพ์ HP', qty: 5, by: 'คุณมาลี', ref: 'DO-002' },
            ]);

            const [locations] = useState([
                { id: 'L001', code: 'A-01', name: 'ตู้เก็บของ A1', icon: '🗄️', floor: 'ชั้น 1', desc: 'เครื่องเขียนทั่วไป' },
                { id: 'L002', code: 'B-01', name: 'ห้องเอกสาร', icon: '🏢', floor: 'ชั้น 2', desc: 'กระดาษและเอกสาร' },
                { id: 'L003', code: 'IT-01', name: 'ตู้อุปกรณ์ IT', icon: '🖥️', floor: 'ชั้น 1', desc: 'อุปกรณ์ IT' },
            ]);

            const [poList] = useState([
                { id: 'PO-2026-001', date: '2026-03-18', requester: 'คุณสมชาย', supplier: 'บริษัท ABC', status: 'อนุมัติแล้ว', total: 6350 },
                { id: 'PO-2026-002', date: '2026-03-22', requester: 'คุณมาลี', supplier: 'ร้าน XYZ', status: 'รออนุมัติ', total: 4250 },
            ]);

            // Theme
            useEffect(() => {
                if (isDark) {
                    document.body.classList.remove('light-mode');
                } else {
                    document.body.classList.add('light-mode');
                }
            }, [isDark]);

            // Stats
            const totalItems = items.length;
            const lowStock = items.filter(i => i.qty > 0 && i.qty <= i.min).length;
            const outOfStock = items.filter(i => i.qty === 0).length;
            const pendingPO = poList.filter(p => p.status === 'รออนุมัติ').length;

            const recentTransactions = [...transactions].reverse().slice(0, 5);

            // Navigation
            const navItems = [
                { id: 'dashboard', label: 'Dashboard', icon: <Icons.Dashboard /> },
                { id: 'inventory', label: 'รายการสินค้า', icon: <Icons.Package /> },
                { id: 'locations', label: 'จุดจัดเก็บ', icon: <Icons.MapPin /> },
                { id: 'receive', label: 'รับสินค้า', icon: <Icons.ArrowDown /> },
                { id: 'issue', label: 'เบิกสินค้า', icon: <Icons.ArrowUp /> },
                { id: 'history', label: 'ประวัติ', icon: <Icons.History /> },
                { id: 'po', label: 'ใบสั่งซื้อ', icon: <Icons.ShoppingCart /> },
                { id: 'export', label: 'Export', icon: <Icons.FileSpreadsheet /> },
                { id: 'users', label: 'จัดการผู้ใช้', icon: <Icons.Users />, adminOnly: true },
                { id: 'settings', label: 'ตั้งค่า', icon: <Icons.Settings /> },
            ];

            const isAdmin = currentUser?.role === 'admin';

            // ==================== Render Pages ====================
            const DashboardPage = () => (
                <div className="space-y-6 animate-fade-in">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <StatsCard title="สินค้าทั้งหมด" value={totalItems} subtitle="รายการ" icon="📦" color="cyan" />
                        <StatsCard title="ใกล้หมด" value={lowStock} subtitle="ต่ำกว่าขั้นต่ำ" icon="⚠️" color="amber" />
                        <StatsCard title="หมดสต็อก" value={outOfStock} subtitle="รายการ" icon="❌" color="red" />
                        <StatsCard title="PO รออนุมัติ" value={pendingPO} subtitle="ใบสั่งซื้อ" icon="🛒" color="purple" />
                    </div>

                    {lowStock > 0 && (
                        <Card className="border-amber-500/30 bg-amber-500/5">
                            <CardContent className="p-4">
                                <div className="flex items-start gap-3">
                                    <span className="text-amber-400"><Icons.AlertTriangle /></span>
                                    <div>
                                        <p className="text-sm font-semibold text-amber-400">⚠️ สินค้าใกล้หมด / หมดสต็อก</p>
                                        <p className="text-xs text-gray-400 mt-1">
                                            มีสินค้า {lowStock} รายการที่ใกล้หมด และ {outOfStock} รายการที่หมดสต็อก
                                        </p>
                                    </div>
                                </div>
                            </CardContent>
                        </Card>
                    )}

                    <Card>
                        <CardHeader>
                            <CardTitle icon="⟳">รายการล่าสุด</CardTitle>
                        </CardHeader>
                        <CardContent>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm">
                                    <thead>
                                        <tr className="border-b border-[var(--border)]">
                                            <th className="text-left py-2 text-[10px] text-[var(--text-muted)]">ประเภท</th>
                                            <th className="text-left py-2 text-[10px] text-[var(--text-muted)]">สินค้า</th>
                                            <th className="text-left py-2 text-[10px] text-[var(--text-muted)]">จำนวน</th>
                                            <th className="text-left py-2 text-[10px] text-[var(--text-muted)]">โดย</th>
                                            <th className="text-left py-2 text-[10px] text-[var(--text-muted)]">วันที่</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {recentTransactions.map(t => (
                                            <tr key={t.id} className="border-b border-[var(--border)]/50">
                                                <td className="py-2">
                                                    <Badge variant={t.type === 'รับสินค้า' ? 'success' : 'danger'}>
                                                        {t.type === 'รับสินค้า' ? '↓ รับ' : '↑ เบิก'}
                                                    </Badge>
                                                </td>
                                                <td className="py-2 font-medium">{t.item_name}</td>
                                                <td className={`py-2 font-semibold ${t.type === 'รับสินค้า' ? 'text-green-400' : 'text-red-400'}`}>
                                                    {t.type === 'รับสินค้า' ? '+' : '-'}{t.qty}
                                                </td>
                                                <td className="py-2 text-gray-400 text-xs">{t.by}</td>
                                                <td className="py-2 text-gray-400 text-xs font-mono">{t.date}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </CardContent>
                    </Card>
                </div>
            );

            const InventoryPage = () => {
                const [search, setSearch] = useState('');
                const [categoryFilter, setCategoryFilter] = useState('');
                
                const filteredItems = items.filter(item => {
                    const matchSearch = !search || item.name.toLowerCase().includes(search.toLowerCase()) || item.id.toLowerCase().includes(search.toLowerCase());

                    return matchSearch && matchCategory;

                    { key: 'unit', label: 'หน่วย' },
                    { key: 'min', label: 'ขั้นต่ำ' },
                    { key: 'price', label: 'ราคา/หน่วย', render: (val) => <span className="font-mono">฿{val}</span> },

                        key: 'status', label: 'สถานะ', render: (_, row) => {
                            if (row.qty === 0) return <Badge variant="danger">หมดสต็อก</Badge>;
                            if (row.qty <= row.min) return <Badge variant="warning">ใกล้หมด</Badge>;
                            return <Badge variant="success">ปกติ</Badge>;

                const handleLogin = () => {

                                </div>
                            </div>

                                        <div className="text-left">

                                            <div className="text-[10px] text-[var(--text-muted)]">admin@office.com</div>
                                        </div>
                                    </button>
                                    <button onClick={() => { setEmail('user@office.com'); setPassword('user123'); }} className="w-full flex items-center gap-3 p-2 rounded-lg border border-[var(--border)] hover:bg-[var(--bg-input)] transition-colors">

                                                    </div>
                                                </div>
                                            </CardContent>

                                                onChange={() => {}}

                                            <Select
                                                label="สินค้า"
                                                value=""
                                                onChange={() => {}}
                                                options={items.map(i => ({ value: i.id, label: `${i.name} — ${i.location} (คงเหลือ: ${i.qty} ${i.unit})` }))}

                                            <Input label="จำนวนที่เบิก" type="number" value="1" onChange={() => {}} />
